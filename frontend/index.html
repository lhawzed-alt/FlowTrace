<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTrace - API 请求追踪</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>FlowTrace - API 请求追踪</h1>
        
        <div id="loading" class="loading">
            正在加载 API 请求数据...
        </div>
        
        <div id="error" class="error" style="display: none;">
            加载数据时出错，请检查后端服务是否运行。
        </div>
        
        <div class="layout">
            <!-- 左侧：请求列表 -->
            <div class="left-panel">
                <h2>请求列表</h2>
                
                <!-- 筛选输入框 -->
                <div class="filter-container">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label for="method-filter">Method:</label>
                            <select id="method-filter" class="filter-select">
                                <option value="all">All</option>
                                <option value="GET">GET</option>
                                <option value="POST">POST</option>
                                <option value="PUT">PUT</option>
                                <option value="DELETE">DELETE</option>
                            </select>
                        </div>
                        
                        <div class="filter-group">
                            <label for="status-filter">Status:</label>
                            <select id="status-filter" class="filter-select">
                                <option value="all">All</option>
                                <option value="200">200</option>
                                <option value="201">201</option>
                                <option value="400">400</option>
                                <option value="500">500</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="filter-row">
                        <div class="filter-group full-width">
                            <label for="url-filter">URL 搜索:</label>
                            <input type="text" id="url-filter" class="filter-input" placeholder="输入 URL 关键词...">
                        </div>
                    </div>
                    
                    <!-- 导出按钮 -->
                    <div class="filter-row">
                        <div class="filter-group full-width">
                            <label>导出数据:</label>
                            <div class="export-buttons">
                                <button id="export-csv-btn" class="export-btn">导出 CSV</button>
                                <button id="export-json-btn" class="export-btn">导出 JSON</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="request-list" class="request-list" style="display: none;">
                    <!-- 请求列表将在这里动态生成 -->
                </div>
                
                <div id="empty-state" class="empty-state" style="display: none;">
                    <h3>暂无 API 请求记录</h3>
                    <p>还没有任何 API 请求被记录。</p>
                </div>
            </div>
            
            <!-- 右侧：请求详情 -->
            <div class="right-panel">
                <h2>请求详情</h2>
                <div id="detail-panel" class="detail-panel">
                    <div id="default-state" class="default-state">
                        <p>请从左侧选择一条请求查看详情</p>
                    </div>
                    <div id="detail-content" class="detail-content" style="display: none;">
                        <!-- 详情内容将在这里动态生成 -->
                    </div>
                    
                    <!-- Replay 按钮区域 -->
                    <div id="replay-section" style="display: none; margin-top: 20px;">
                        <button id="replay-btn" class="replay-btn" disabled>
                            Replay
                        </button>
                    </div>
                    
                    <!-- Replay 结果区域 -->
                    <div id="replay-result" class="replay-result" style="display: none; margin-top: 20px;">
                        <h3>Replay 结果</h3>
                        <div id="replay-loading" class="replay-loading" style="display: none;">
                            正在重放请求...
                        </div>
                        <div id="replay-error" class="replay-error" style="display: none;">
                            <!-- 错误信息将在这里显示 -->
                        </div>
                        <div id="replay-content" class="replay-content" style="display: none;">
                            <!-- Replay 结果将在这里显示 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js" defer></script>
</body>
</html>
